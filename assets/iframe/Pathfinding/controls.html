
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<style>
    #interactivecanvasContainer {
        display: flex;
        justify-content: center;
        align-items: center;
        /* height: calc(100vh - 150px); Adjust based on control height */
    }

    canvas {
        width: 100%;
        /* height: 100%; */
    }



    .active-button {
        background-color: #007bff !important;
        color: white !important;
    }
</style>

<div class="controls">
    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col">
                <label for="algorithmSelect">Algorithm:</label>
                <select id="algorithmSelect" class="form-control" onchange="selectAlgorithm(this.value)">
                    <option value="dijkstra">Dijkstra</option>
                    <option value="a_star">A*</option>
                </select>
            </div>
            <div class="col">
                <button class="btn btn-primary btn-block mt-4" onclick="startPathfinding()">Start</button>
            </div>
            <div class="col">
                <button class="btn btn-secondary btn-block mt-4" onclick="resetGrid()">Reset</button>
            </div>
            <div class="col">
                <button class="btn btn-warning btn-block mt-4" onclick="clearOpenClosed()">Clear Open/Closed</button>
            </div>
            <div class="col">
                <button class="btn btn-danger btn-block mt-4" onclick="clearAll()">Clear All</button>
            </div>
            <div class="col">
                <label for="speedSlider">Speed:</label>
                <input type="range" id="speedSlider" class="form-control-range" min="1" max="100" value="50" oninput="updateSpeed(this.value)">
            </div>
            <div class="col">
                <button id="setStartButton" class="btn btn-info btn-block mt-4" onclick="toggleSetStart()">Set Start</button>
            </div>
            <div class="col">
                <button id="setEndButton" class="btn btn-info btn-block mt-4" onclick="toggleSetEnd()">Set End</button>
            </div>
        </div>
        <div id="interactivecanvasContainer">
            <div id="interactivecanvasPlaceholder"></div>
        </div>
    </div>
</div>


<script src="/assets/js/Pathfinding/cell.js"></script>
<script src="/assets/js/Pathfinding/dijkstra.js"></script>
<script src="/assets/js/Pathfinding/a_star.js"></script>
<script src="/assets/js/Pathfinding/sketch.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
